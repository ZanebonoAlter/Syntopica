services:
  firecrawl:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: syntopica-firecrawl
    restart: unless-stopped
    ports:
      - "${FIRECRAWL_PORT:-3002}:3002"
    environment:
      REDIS_URL: redis://firecrawl-redis:6379
      REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
      USE_DB_AUTHENTICATION: "false"
      PORT: "3002"
      HOST: "0.0.0.0"
      NUM_WORKERS_PER_QUEUE: "2"
    depends_on:
      firecrawl-redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
    networks:
      - syntopica-net

  firecrawl-redis:
    image: redis:alpine
    container_name: syntopica-firecrawl-redis
    restart: unless-stopped
    volumes:
      - firecrawl-redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - syntopica-net

  firecrawl-playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    container_name: syntopica-firecrawl-playwright
    restart: unless-stopped
    environment:
      PORT: "3000"
    networks:
      - syntopica-net

volumes:
  firecrawl-redis-data:

networks:
  syntopica-net:
    external: true
