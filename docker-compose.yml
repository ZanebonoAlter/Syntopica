services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: syntopica-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syntopica}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: ${TZ:-Asia/Shanghai}
      PGTZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-syntopica}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - syntopica-net

  syntopica:
    image: zanebonoalter/syntopica:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syntopica
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    environment:
      DATABASE_DSN: host=postgres user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-syntopica} port=5432 sslmode=disable
      SERVER_MODE: release
    networks:
      - syntopica-net

networks:
  syntopica-net:
    name: syntopica-net
