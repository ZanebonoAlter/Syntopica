services:
  rsshub:
    image: diygod/rsshub:latest
    container_name: syntopica-rsshub
    restart: unless-stopped
    ports:
      - "${RSSHUB_PORT:-1200}:1200"
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://localhost:1200/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
